<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Register | Computer Force</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="logo.svg" type="image/svg+xml">
</head>
<body>

  <!-- HEADER -->
  <header>
    <a href="index.html">
      <img id="logo" src="logo.svg" alt="Computer Force Logo">
    </a>
  </header>

  <!-- NAVIGATION / MENU -->
  <nav id="nav-menu">
    <button id="hamburger-btn" class="hamburger-btn" type="button">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <ul>
      <li><a href="products.html">Products</a></li>
      <li><a href="register.html">Register</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
    <div class="search-area">
      <input type="text" placeholder="Search...">
      <button type="button">Search</button>
    </div>
  </nav>

  <!-- MAIN CONTENT + ASIDE WRAPPER -->
  <div class="content-wrapper">

    <!-- MAIN SECTION (80%) -->
    <main>
      <h1>Registration Form</h1>
      <p class="page-intro">Please complete the following form to register for an account on our website.</p>

      <form class="registration-form" action="processRegisterCustomer.php" method="post" id="registrationForm">

        <!-- Username -->
        <div class="form-group">
          <label for="username">Username *</label>
          <input type="text" id="username" name="username" required placeholder="Choose a unique username">
        </div>

        <!-- Email Address -->
        <div class="form-group">
          <label for="email">Email Address *</label>
          <input type="email" id="email" name="email" required placeholder="your@email.com">
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">Password *</label>
          <input type="password" id="password" name="password" required placeholder="Create a password">
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label for="confirmPassword">Confirm Password *</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Repeat your password">
        </div>

        <!-- First Name -->
        <div class="form-group">
          <label for="firstName">First Name *</label>
          <input type="text" id="firstName" name="firstName" required placeholder="Your first name">
        </div>

        <!-- Surname -->
        <div class="form-group">
          <label for="surname">Surname *</label>
          <input type="text" id="surname" name="surname" required placeholder="Your last name">
        </div>

        <!-- Gender -->
        <div class="form-group">
          <label>Gender *</label>
          <div class="radio-group">
            <label><input type="radio" name="gender" value="male" required> Male</label>
            <label><input type="radio" name="gender" value="female"> Female</label>
          </div>
        </div>

        <!-- Date of Birth -->
        <div class="form-group">
          <label for="dob">Date of Birth</label>
          <input type="date" id="dob" name="dob">
        </div>

        <!-- Address -->
        <div class="form-group">
          <label for="address">Address *</label>
          <input type="text" id="address" name="address" required placeholder="Street address">
        </div>

        <!-- Suburb -->
        <div class="form-group">
          <label for="suburb">Suburb *</label>
          <input type="text" id="suburb" name="suburb" required placeholder="Suburb">
        </div>

        <!-- Postcode -->
        <div class="form-group">
          <label for="postcode">Postcode *</label>
          <input type="text" id="postcode" name="postcode" required placeholder="e.g. 2000">
        </div>

        <!-- State -->
        <div class="form-group">
          <label for="state">State *</label>
          <select id="state" name="state" required>
            <option value="">-- Select State --</option>
            <option value="ACT">ACT</option>
            <option value="NSW">NSW</option>
            <option value="NT">NT</option>
            <option value="QLD">QLD</option>
            <option value="SA">SA</option>
            <option value="TAS">TAS</option>
            <option value="VIC">VIC</option>
            <option value="WA">WA</option>
          </select>
        </div>

        <!-- Phone Number -->
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="text" id="phone" name="phone" placeholder="e.g. 02 4444 5555">
        </div>

        <!-- Buttons -->
        <div class="form-buttons">
          <input type="button" class="btn-clear" value="Clear" onclick="document.getElementById('registrationForm').reset()">
          <input type="submit" class="btn-register" value="Register" onclick="return validateForm()">
        </div>

      </form>
    </main>

    <!-- ASIDE SECTION (20%) -->
    <aside>
      <h2>Purchases</h2>
      <div id="cart-items-list"></div>
      <table class="purchases-table">
        <tr>
          <td id="cart-count">0 items</td>
          <td id="cart-subtotal">$0.00</td>
        </tr>
        <tr>
          <td colspan="2">
            <input type="button" class="checkout-btn" value="Go to Checkout" onclick="window.location.href='checkout.html'">
          </td>
        </tr>
      </table>
    </aside>

  </div><!-- .content-wrapper -->

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2026 Natalia Ambrosio. All rights reserved.</p>
  </footer>

  <script src="cart.js"></script>
  <script>
    // Hamburger menu toggle
    const hamburgerBtn = document.getElementById('hamburger-btn');
    const navMenu = document.getElementById('nav-menu');
    
    hamburgerBtn.addEventListener('click', function() {
      navMenu.classList.toggle('active');
    });
    
    // Close menu when a link is clicked
    const navLinks = navMenu.querySelectorAll('a');
    navLinks.forEach(link => {
      link.addEventListener('click', function() {
        navMenu.classList.remove('active');
      });
    });
    
    function validateForm() {
      var password = document.getElementById('password').value;
      var confirmPassword = document.getElementById('confirmPassword').value;
      if (password !== confirmPassword) {
        alert('Password and Confirm Password do not match. Please try again.');
        return false;
      }
      return true;
    }
  </script>

</body>
</html>
