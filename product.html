<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Product | Computer Force</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="logo.svg" type="image/svg+xml">
</head>
<body>

  <!-- HEADER -->
  <header>
    <a href="index.html">
      <img id="logo" src="logo.svg" alt="Computer Force Logo">
    </a>
  </header>

  <!-- NAVIGATION / MENU -->
  <nav id="nav-menu">
    <button id="hamburger-btn" class="hamburger-btn" type="button">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <ul>
      <li><a href="products.html">Products</a></li>
      <li><a href="register.html">Register</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
    <div class="search-area">
      <input type="text" placeholder="Search...">
      <button type="button">Search</button>
    </div>
  </nav>

  <!-- MAIN CONTENT + ASIDE WRAPPER -->
  <div class="content-wrapper">

    <!-- MAIN SECTION (80%) - filled dynamically by JS -->
    <main id="product-main-content">
      <p>Loading...</p>
    </main>

    <!-- ASIDE SECTION (20%) -->
    <aside>
      <h2>Purchases</h2>
      <div id="cart-items-list"></div>
      <table class="purchases-table">
        <tr>
          <td id="cart-count">0 items</td>
          <td id="cart-subtotal">$0.00</td>
        </tr>
        <tr>
          <td colspan="2">
            <input type="button" class="checkout-btn" value="Go to Checkout" onclick="window.location.href='checkout.html'">
          </td>
        </tr>
      </table>
    </aside>

  </div><!-- .content-wrapper -->

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2026 Natalia Ambrosio. All rights reserved.</p>
  </footer>

  <script src="cart.js"></script>
  <script>
    // Hamburger menu toggle
    const hamburgerBtn = document.getElementById('hamburger-btn');
    const navMenu = document.getElementById('nav-menu');
    
    hamburgerBtn.addEventListener('click', function() {
      navMenu.classList.toggle('active');
    });
    
    // Close menu when a link is clicked
    const navLinks = navMenu.querySelectorAll('a');
    navLinks.forEach(link => {
      link.addEventListener('click', function() {
        navMenu.classList.remove('active');
      });
    });

    document.addEventListener('DOMContentLoaded', function () {
      var params = new URLSearchParams(window.location.search);
      var categoryId = params.get('category');
      var productId = params.get('id');
      var mainEl = document.getElementById('product-main-content');

      if (productId) {
        renderSingleProduct(productId, mainEl);
      } else if (categoryId) {
        renderCategoryProducts(categoryId, mainEl);
      } else {
        mainEl.innerHTML = '<h1>Products</h1><p>Please select a category from the <a href="products.html">Products</a> page.</p>';
      }
    });

    /* ---- Single product detail view ---- */
    function renderSingleProduct(id, container) {
      var product = CF_PRODUCTS.find(function (p) { return p.id === id; });
      if (!product) {
        container.innerHTML = '<h1>Product not found</h1><p><a href="products.html">Back to Products</a></p>';
        return;
      }
      document.title = product.name + ' | Computer Force';
      var categoryName = CF_CATEGORY_NAMES[product.category] || product.category;

      container.innerHTML =
        '<nav class="breadcrumb">' +
          '<a href="products.html">Products</a> &rsaquo; ' +
          '<a href="product.html?category=' + product.category + '">' + categoryName + '</a> &rsaquo; ' +
          product.name +
        '</nav>' +
        '<div class="product-detail">' +
          '<div class="product-detail-img">' +
            '<img src="' + product.img + '" alt="' + product.name + '">' +
          '</div>' +
          '<div class="product-detail-info">' +
            '<p class="product-detail-category">' + categoryName + '</p>' +
            '<h1>' + product.name + '</h1>' +
            '<p class="product-detail-price">$' + product.price.toFixed(2) + '</p>' +
            '<p class="product-detail-desc">' + product.description + '</p>' +
            '<div class="product-detail-actions">' +
              '<label for="qty-input" class="qty-label">Qty:</label>' +
              '<input type="number" id="qty-input" value="1" min="1" max="99" class="qty-input">' +
              '<input type="button" class="btn-add-cart" id="add-cart-btn" value="Add to Cart" onclick="addToCartFromDetail(\'' + product.id + '\')">' +
            '</div>' +
            '<a href="product.html?category=' + product.category + '" class="back-link">&larr; Back to ' + categoryName + '</a>' +
          '</div>' +
        '</div>';
    }

    function addToCartFromDetail(productId) {
      var qty = parseInt(document.getElementById('qty-input').value) || 1;
      CF_Cart.add(productId, qty);
      var btn = document.getElementById('add-cart-btn');
      var orig = btn.value;
      btn.value = 'Added to Cart!';
      btn.style.backgroundColor = '#2563a8';
      setTimeout(function () { btn.value = orig; btn.style.backgroundColor = ''; }, 1800);
    }

    /* ---- Category product listing view ---- */
    function renderCategoryProducts(categoryId, container) {
      var products = CF_PRODUCTS.filter(function (p) { return p.category === categoryId; });
      var categoryName = CF_CATEGORY_NAMES[categoryId] || categoryId;
      document.title = categoryName + ' | Computer Force';

      if (products.length === 0) {
        container.innerHTML = '<h1>' + categoryName + '</h1><p>No products found in this category.</p>';
        return;
      }

      var html =
        '<nav class="breadcrumb"><a href="products.html">Products</a> &rsaquo; ' + categoryName + '</nav>' +
        '<h1>' + categoryName + '</h1>' +
        '<p class="page-intro">Browse our range of ' + categoryName.toLowerCase() + ' products.</p>' +
        '<div class="products-list-grid">';

      products.forEach(function (p) {
        html +=
          '<div class="product-card">' +
            '<a href="product.html?id=' + p.id + '">' +
              '<img src="' + p.img + '" alt="' + p.name + '">' +
            '</a>' +
            '<div class="product-card-info">' +
              '<h3><a href="product.html?id=' + p.id + '">' + p.name + '</a></h3>' +
              '<p class="product-card-price">$' + p.price.toFixed(2) + '</p>' +
              '<div class="product-card-actions">' +
                '<a href="product.html?id=' + p.id + '" class="btn-view-details">View Details</a>' +
                '<button class="btn-add-cart-small" onclick="CF_Cart.add(\'' + p.id + '\', 1)">Add to Cart</button>' +
              '</div>' +
            '</div>' +
          '</div>';
      });

      html += '</div>';
      container.innerHTML = html;
    }
  </script>

</body>
</html>
